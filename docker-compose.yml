version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: sigma_backend
    restart: always
    command: /app/entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      # Mount storage for persistence
      - sigma_storage:/app/storage
      # Mount code for dev (optional, uncomment for hot-reload in dev)
      # - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_BASE_PATH=/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: sigma_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  evolution-api:
    image: atendai/evolution-api:v2.2.0
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - DEL_INSTANCE=true
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=sqlite:////evolution/store/evolution.db
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-sigma_secret_key_123}
      - WEBHOOK_GLOBAL_URL=http://backend:8000/webhooks/whatsapp
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,MESSAGES_UPSERT
      - WEBHOOK_EVENTS_ERRORS=false
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - backend

volumes:
  sigma_storage:
  evolution_store:
  evolution_instances:
