version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: sigma_backend
    restart: always
    command: /app/entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      # Mount storage for persistence
      - sigma_storage:/app/storage
      # Mount code for dev (optional, uncomment for hot-reload in dev)
      # - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_BASE_PATH=/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: sigma_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sigma_storage:
